<!DOCTYPE html>
<html>
<body style = "background-color: #b8b3b3;" text = "black" font-family = "Arial, sans-serif" >
    <h2 style = "color: #333; font-size: 24px; font-weight: bold;" align = "center" margin = "20px" >Student Registration</h2>
    <div style="margin: 20px; padding: 20px; border: 10px solid #5a50e7; border-radius: 5px;">
    <form>
        Name: <input type="text" name="name"><br><br>
        Gender: 
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other
        <br><br>
        Subjects:
        <input type="checkbox" name="sub" value="math"> Math
        <input type="checkbox" name="sub" value="english"> English
        <input type="checkbox" name="sub" value="history"> History
        <input type="checkbox" name="sub" value="manipuri"> Manipuri
        <input type="checkbox" name="sub" value="science"> Science<br><br>
        <input type="submit" value="Register">
    </form>
    </div>
</body>
</html>
