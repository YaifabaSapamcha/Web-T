<!DOCTYPE html>
<html>
<body>
    <div style="margin: 20px; padding: 20px; border: 1px solid #d5d55c; border-radius: 5px;">
    <form>
        Text Field: <input type="text" name="username"><br>
        Password Field: <input type="password" name="pwd"><br>
        Email: <input type="email" name="email"><br>

        <select name="city">

            <option value="mum">Mumbai</option>
            <option value="che">Chennai</option>
            <option value="ban">Bangalore</option>
            <option value="hyd">Hyderabad</option>
            <option value="pune">Pune</option>
            <option value="ahm">Ahmedabad</option>
            <option value="jaipur">Jaipur</option>
            <option value="lucknow">Lucknow</option>
            <option value="kanpur">Kanpur</option>
            <option value="nagpur">Nagpur</option>
            <option value="indore">Indore</option> 
            <option value="thiruvananthapuram">Thiruvananthapuram</option> 
            <option value="coimbatore">Coimbatore</option>

        </select><br>
        Radio: <input type="radio" name="status" value="single"> Single <input type="radio" name="status" value="married"> Married<br>

        <input type="submit" value="Submit Data">
    </form>
    </div>

</html>
