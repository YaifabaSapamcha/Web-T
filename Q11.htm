<!DOCTYPE html>
<html>
<head>
<style>
    .header { position: fixed; top: 0; left: 0; width: 100%; background: #333; color: white; text-align: center; padding: 10px; }
    .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: white; text-align: center; padding: 10px; }
    .content { margin-top: 60px; margin-bottom: 60px; }
</style>
</head>
<body>
    <div class="header">I am a Fixed Header</div>
    <div class="content">Scrollable content goes here...</div>
    <div class="footer">I am a Fixed Footer</div>
</body>
</html>
