<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #FFFFFF;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
            background-color: #000000;
        }
        .hero h1 {
            font-size: 3em;
            margin: 0;
        }
        .hero p {
            color: #B0B0B0;
            font-size: 1.2em;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 50px 20px;
            gap: 20px;
        }
        .card {
            background-color: #1C1C1C;
            border-radius: 16px;
            padding: 20px;
            width: 200px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.2em;
        }
        .cta {
            background-color: #FFFFFF;
            color: #000000;
            text-align: center;
            padding: 50px 20px;
        }
        .cta h2 {
            margin: 0;
        }
    </style>
</head>
