<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple homepage to navigate to Q1–Q12 pages.">
    <title>Home</title>
    <style>
        :root {
            color-scheme: dark;
            --primary: #573CFA;
            --secondary: #F88D1A;
            --danger: #E8083E;
            --success: #02864A;
            --neutral: #1C1A27;

            --bg: var(--neutral);
            --text: var(--primary);
            --muted: var(--secondary);
            --card: var(--primary);
            --cardText: var(--neutral);
            --ring: var(--danger);
            --shadow: 0 10px 30px rgba(28, 26, 39, 0.55);
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .hero {
            text-align: center;
            padding: clamp(56px, 10vw, 96px) 20px;
            background-color: var(--bg);
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin: 0;
            letter-spacing: -0.02em;
        }
        .hero p {
            color: var(--muted);
            font-size: 1.1em;
            margin: 12px 0 0;
        }
        .cards {
            list-style: none;
            margin: 0;
            padding: 42px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            max-width: 980px;
            margin-inline: auto;
        }
        .card {
            margin: 0;
        }
        .card a {
            display: block;
            background-color: var(--card);
            border-radius: var(--radius);
            padding: 18px 16px;
            text-align: center;
            box-shadow: var(--shadow);
            color: var(--cardText);
            text-decoration: none;
            font-size: 1.15em;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }
        .card a:hover {
            transform: translateY(-4px);
        }
        .card a:focus-visible {
            outline: 3px solid var(--ring);
            outline-offset: 3px;
        }
        .cta {
            background-color: var(--secondary);
            color: var(--neutral);
            text-align: center;
            padding: 44px 20px;
        }
        .cta h2 {
            margin: 0;
        }
        .cta p {
            margin: 10px 0 0;
        }
        @media (prefers-reduced-motion: reduce) {
            .card a { transition: none; }
            .card a:hover { transform: none; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1>Hi, I'm Sapamcha Yaiphaba</h1>
        <p>Welcome to My Website</p>
        <p>Explore the pages below</p>
    </header>

    <main aria-label="Questions">
        <ul class="cards">
            <li class="card"><a href="Q1.htm">Q1</a></li>
            <li class="card"><a href="Q2.htm">Q2</a></li>
            <li class="card"><a href="Q3.htm">Q3</a></li>
            <li class="card"><a href="Q4.htm">Q4</a></li>
            <li class="card"><a href="Q5.htm">Q5</a></li>
            <li class="card"><a href="Q6.htm">Q6</a></li>
            <li class="card"><a href="Q7.htm">Q7</a></li>
            <li class="card"><a href="Q8.htm">Q8</a></li>
            <li class="card"><a href="Q9.htm">Q9</a></li>
            <li class="card"><a href="Q10.htm">Q10</a></li>
            <li class="card"><a href="Q11.htm">Q11</a></li>
            <li class="card"><a href="Q12.htm">Q12</a></li>
        </ul>
    </main>

    <footer class="cta">
        <h2>To get Started</h2>
        <p>Pick any question number card above to view the answer.</p>
    </footer>
</body>
</html>
